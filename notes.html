<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notes</title>
    <style>

body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    margin: 0;
}


.header {
    background: #4f46e5;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: 30px auto;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px 5px 5px 0;
    font-weight: 500;
}


.logout-btn {
    background: rgb(42, 42, 42);
    color: white;
}
.logout-btn :hover{
    background: rgb(21, 21, 21);
    color: white;
}
.outerbtns{
    display: flex;
    align-items: center;
    justify-content: space-around;
}

.create-btn {
    background: green;
    color: white;
}
.create-btn:hover{
    background-color: rgb(1, 87, 1);
}

.update-btn {
    background: #f59e0b;
    color: white;
}
.update-btn:hover{
     background: #7e5309;
}


input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}


#notesList {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 20px;
}


.note-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.note-card h4 {
    margin: 0 0 8px;
}

.note-card p {
    color: #555;
    margin: 0;
}
.btns{
    display: flex;
    align-items: center;
    justify-content: space-around;
    margin-top: 20px;
}
#editbtn{
    height: 40px;
    width:70px;
    background-color: #f59e0b;
}
#editbtn:hover{
    background-color: #a06909;
}
#deletebtn{
     height: 40px;
    width:70px;
    background-color: red;

}
#deletebtn:hover{
    background-color: rgb(192, 17, 17);
}

    </style>
</head>
<body>
    <div class="container">
    <div class="topbar">
        <h2>Notes Page</h2>
        <button  class="logout-btn" onclick="logout()">Logout</button>
    </div>

        <input id="title" placeholder="Title" />
        <input id="content" placeholder="Content" />
        <div class="outerbtns">

            <button class="create-btn " onclick="createNote()">Create</button>
            <button class="update-btn" onclick="updateNote()">Update</button>
        </div>

        <hr>

        <h3>All Notes</h3>
        <div id="notesList"></div>
    </div>

        <script>
        const BASE_URL = "https://notekeeper-pwcjpjkqx-navyasripuvvadas-projects.vercel.app/";
        let editId = null;

        function getToken() {
            return localStorage.getItem("token");
        }

        async function fetchNotes() {
            const token = getToken();

            if (!token) {
                alert("Please login first");
                window.location.href = "login.html";
                return;
            }

            const res = await fetch(`${BASE_URL}notes`, {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            const data = await res.json();
            console.log("NOTES RESPONSE:", data);

            if (!res.ok) {
                alert(data.message || "Error fetching notes");
                return;
            }

            const list = document.getElementById("notesList");
            list.innerHTML = "";

            data.forEach(note => {
                list.innerHTML += `
                    <div class="note-card" >
                        <h4>${note.title}</h4>
                        <p>${note.content}</p>
                        <div class="btns">
                            <button id="editbtn" onclick="editNote(${note.id}, '${note.title}', '${note.content}')">Edit</button>
                            <button  id="deletebtn" onclick="deleteNote(${note.id})">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        async function createNote() {
            const token = getToken();

            const title = document.getElementById("title").value;
            const content = document.getElementById("content").value;

            const res = await fetch(`${BASE_URL}/notes`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ title, content })
            });

            const data = await res.json();
            console.log("CREATE RESPONSE:", data);

            fetchNotes();
        }

        function editNote(id, title, content) {
            editId = id;
            document.getElementById("title").value = title;
            document.getElementById("content").value = content;
        }


        async function updateNote() {
            const token = getToken();

            await fetch(`${BASE_URL}/notes/${editId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    title: document.getElementById("title").value,
                    content: document.getElementById("content").value
                })
            });

            fetchNotes();
        }


        async function deleteNote(id) {
            const token = getToken();

            await fetch(`${BASE_URL}/notes/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            fetchNotes();
        }


        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        fetchNotes();
</script>

</body>
</html>
